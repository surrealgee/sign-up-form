<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="wrapper">
        <header class="hero-section">
            <div class="hero">
                <img src="images/odin-lined.png" alt="The Odin Project Logo">
                <h1>ODIN</h1>
        </header>
        <main>
            <div class="main-head">
                <p>This is not a real online service! You know you need something like this in your life to help you
                    realize your deepest dreams.<br>Sign up <em>now</em> to get started.</p>
                <p>You <em>know</em> you want to.</p>
            </div>
            <div class="form-container">
                <p>Let's do this!</p>
                <form action="" id="form-el">
                    <div class="form-row">
                        <p>
                            <label for="first-name">FIRST NAME</label>
                            <input type="text" id="first-name" name="first_name" required>
                        </p>
                        <p>
                            <label for="last-name">LAST NAME</label>
                            <input type="text" id="last-name" name="last_name" required>
                        </p>
                    </div>
                    <div class="form-row">
                        <p>
                            <label for="email">EMAIL</label>
                            <input type="email" name="email" id="email" required>
                        </p>
                        <p>
                            <label for="phone-number">PHONE NUMBER</label>
                            <input type="tel" name="phone" id="phone-number" required>
                        </p>
                    </div>
                    <div class="form-row">
                        <p>
                            <label for="password">PASSWORD</label>
                            <input type="password" id="password" name="password" required>
                        </p>
                        <p>
                            <label for="confirm-password">CONFIRM PASSWORD</label>
                            <input type="password" id="confirm-password" required>
                        </p>
                    </div>
                </form>
            </div>
            <div class="main-bottom">
                <button type="submit" id="submit-btn" form="form-el">Create Account</button>
                <p>Already have an account? <a href="#">Log in</a></p>
            </div>
        </main>

    </div>
    </div>

</body>

</html>
